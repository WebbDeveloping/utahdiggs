# Conditional visibility and dynamic field rules for the MLS Input form.
# Inferred from JotForm HTML (always-hidden classes), WFRMLS Form B requirements,
# and field relationships.

rules:
  - id: secondary-owner-contact
    description: Show secondary owner contact fields when two owners are listed.
    when:
      field: ownerCount
      equals: Two
    show:
      - secondaryOwnerName
      - secondaryOwnerPhone
      - secondaryOwnerEmail

  - id: secondary-owner-signature
    description: Show secondary owner signature and initials when two owners are listed.
    when:
      field: ownerCount
      equals: Two
    show:
      - q23-signature23
      - q23-initials

  - id: non-standard-address-directions
    description: Show directions when address is non-standard.
    when:
      field: nonStandardAddress
      equals: "Yes"
    show:
      - directionsRemarks

  - id: owner-address-fields
    description: Show owner mailing address when it differs from the listing address.
    when:
      field: ownerAddressSameAsListing
      equals: "No"
    show:
      - ownerAddress

  - id: hoa-fee-and-contact
    description: Show HOA fee, contact, amenities, and related fields when property is in an HOA.
    when:
      field: hoa
      equals: "Yes"
    show:
      - hoaFeeMonth
      - hoaFeeFrequency
      - hoaChangeFeeType
      - hoaContact
      - hoaContactPhone
      - hoaRentalCap
      - hoaAmenities
      - hoaRemarks

  - id: hoa-change-fee-amount
    description: Show change fee amount when a percentage or dollar change fee applies.
    when:
      all:
        - field: hoa
          equals: "Yes"
        - field: hoaChangeFeeType
          equals: Percentage of sales price
    show:
      - hoaChangeFeeAmount

  - id: hoa-change-fee-amount-dollar
    description: Show change fee amount when a dollar change fee applies.
    when:
      all:
        - field: hoa
          equals: "Yes"
        - field: hoaChangeFeeType
          equals: Dollar amount
    show:
      - hoaChangeFeeAmount

  - id: solar-follow-ups
    description: Show solar details when property has solar.
    when:
      field: solar
      equals: "Yes"
    show:
      - solarOwnership
      - solarYearInstalled
      - solarSystemSizeKw
      - solarBatteryStorage
      - solarLoanOrLien
      - solarDocsAvailable

  - id: solar-leased-details
    description: Show lease/PPA terms when solar is leased.
    when:
      all:
        - field: solar
          equals: "Yes"
        - field: solarOwnership
          equals: Leased
    show:
      - solarCompanyName
      - solarMonthlyPayment
      - solarAgreementTerm
      - solarTransferable

  - id: solar-ppa-details
    description: Show lease/PPA terms when solar is under a PPA.
    when:
      all:
        - field: solar
          equals: "Yes"
        - field: solarOwnership
          equals: "Power Purchase Agreement (PPA)"
    show:
      - solarCompanyName
      - solarMonthlyPayment
      - solarAgreementTerm
      - solarTransferable

  - id: solar-financed-details
    description: Show finance company and payment terms when solar is financed.
    when:
      all:
        - field: solar
          equals: "Yes"
        - field: solarOwnership
          equals: Financed
    show:
      - solarFinanceCompany
      - solarMonthlyPayment
      - solarAgreementTerm
      - solarTransferable

  - id: pets-animals
    description: Show animal type options when pets are allowed.
    when:
      field: petsAllowed
      equals: "Yes"
    show:
      - q47-animals

  - id: tax-parcel-number
    description: Show tax parcel number when a parcel number is assigned.
    when:
      field: noAssignedParcelNumber
      equals: "No"
    show:
      - taxParcelNumber

  - id: adu-follow-ups
    description: Show ADU details when the property has an accessory dwelling unit.
    when:
      field: adu
      equals: "Yes"
    show:
      - aduType
      - aduSqft
      - aduBeds
      - aduBaths
      - aduKitchen
      - aduSeparateEntrance
      - aduSeparateWaterMeter
      - aduSeparateGasMeter
      - aduSeparateElectricMeter
      - aduCurrentlyRented
      - aduRemarks

  - id: adu-monthly-rent
    description: Show current monthly rent when the ADU is currently rented.
    when:
      all:
        - field: adu
          equals: "Yes"
        - field: aduCurrentlyRented
          equals: "Yes"
    show:
      - aduMonthlyRent

  - id: level-matrix-rows
    description: Level breakdown matrix row count follows the selected number of levels.
    dynamic:
      field: q117-2level117
      rowCountFrom: levelCount
      rowLabels:
        - Main Level
        - Basement
        - Second Story
        - Third Story
        - Fourth Story

  - id: garage-capacity
    description: Show garage capacity when Parking includes Garage.
    when:
      field: q30-typea30
      includes: Garage
    show:
      - q208-garagecapacity

  - id: carport-capacity
    description: Show carport capacity when Parking includes Carport.
    when:
      field: q30-typea30
      includes: Carport
    show:
      - q209-garagecapacity209

  - id: rv-parking-dimensions
    description: Show RV parking height and length when Parking includes RV Parking.
    when:
      field: q30-typea30
      includes: RV Parking
    show:
      - rvParkingHeight
      - rvParkingLength

  - id: pool-features
    description: Show pool type/features when property has a pool.
    when:
      field: q184-doesthe
      equals: "Yes"
    show:
      - q63-pooltype

  - id: owner-occupied-showings
    description: Owner-occupied showing approval flow.
    when:
      field: q191-propertyoccupancy
      equals: Owner Occupied
    show:
      - q192-howmany
      - q194-ownershowing
      - q195-phonenumber
      - q196-email
      - q197-ownershowing197
      - q198-ownershowing198
      - q199-ownershowing199

  - id: owner-showing-contact-2
    description: Second owner showing contact when two owners can approve.
    when:
      all:
        - field: q191-propertyoccupancy
          equals: Owner Occupied
        - field: q192-howmany
          equals: Two
    show:
      - q197-ownershowing197
      - q198-ownershowing198
      - q199-ownershowing199

  - id: tenant-occupied-showings
    description: Tenant-occupied showing approval flow.
    when:
      field: q191-propertyoccupancy
      equals: Tenant Occupied
    show:
      - q193-howmany193
      - q200-tenantshowing
      - q201-ownershowing201
      - q202-tenantshowing202
      - q203-tenantshowing203
      - q204-tenantshowing204
      - q205-tenantshowing205

  - id: tenant-showing-contact-2
    description: Second tenant showing contact when two tenants can approve.
    when:
      all:
        - field: q191-propertyoccupancy
          equals: Tenant Occupied
        - field: q193-howmany193
          equals: Two
    show:
      - q203-tenantshowing203
      - q204-tenantshowing204
      - q205-tenantshowing205

  - id: alternate-title-company
    description: Alternate title company contact when seller declines Prime Title.
    when:
      field: q207-typea207
      equals: "No, I have someone else"
    show:
      - q211-name211
      - q212-typea212
      - q213-email213
      - q214-phonenumber214

knownGaps:
  - note: >-
      Agent-only WFRMLS Matrix fields (listing date, expiration date, listing type EAL/ERS,
      agent/co-agent IDs, BAC compensation, dual/VAR rate, photo instructions) are intentionally
      omitted — filled by Utah Digs staff when entering the listing.
  - note: Early steps (1-4) and newly added fields lack JotForm IDs in the source dump; marked TODO for migration mapping.
