id: hoa-solar
title: "HOA & Solar"
fields:
  - id: hoa
    label: "Is the property in an HOA?"
    type: radio
    required: true
    options:
      - "Yes"
      - "No"
    jotform:
      id: TODO
  - id: hoaFeeMonth
    label: HOA Fee Amount
    type: currency
    required: true
    status: hidden-in-jotform
    placeholder: "e.g., $150"
    jotform:
      id: TODO
      name: q_hoaFeeMonth
  - id: hoaFeeFrequency
    label: HOA Fee Frequency
    type: radio
    required: true
    status: hidden-in-jotform
    options:
      - Monthly
      - Quarterly
      - Annually
    jotform:
      id: TODO
      name: q_hoaFeeFrequency
  - id: hoaChangeFeeType
    label: HOA Change / Transfer Fee
    type: radio
    status: hidden-in-jotform
    description: How any HOA change or transfer fee is calculated, if applicable.
    options:
      - Percentage of sales price
      - Dollar amount
      - None / Unknown
    jotform:
      id: TODO
      name: q_hoaChangeFeeType
  - id: hoaChangeFeeAmount
    label: HOA Change Fee Amount
    type: text
    status: hidden-in-jotform
    placeholder: "e.g., 0.5% or $500"
    description: Enter the percentage or dollar amount of the change/transfer fee.
    jotform:
      id: TODO
      name: q_hoaChangeFeeAmount
  - id: hoaContact
    label: HOA Contact Name
    type: text
    status: hidden-in-jotform
    jotform:
      id: TODO
      name: q_hoaContact
  - id: hoaContactPhone
    label: HOA Contact Phone
    type: phone
    status: hidden-in-jotform
    jotform:
      id: TODO
      name: q_hoaContactPhone
  - id: hoaRentalCap
    label: "Does the HOA have a rental cap?"
    type: radio
    status: hidden-in-jotform
    options:
      - "Yes"
      - "No"
      - Unknown
    jotform:
      id: TODO
      name: q_hoaRentalCap
  - id: hoaAmenities
    label: HOA Amenities
    type: checkbox
    status: hidden-in-jotform
    description: Community / HOA amenities (not individual property features).
    $ref: options/hoa-amenities.yaml
    jotform:
      id: TODO
      name: q_hoaAmenities
  - id: hoaRemarks
    type: textarea
    label: HOA Remarks
    status: hidden-in-jotform
    placeholder: "Any HOA restrictions, fees, or rules buyers should know."
    jotform:
      id: TODO
      name: q_hoaRemarks
  - id: shortTermRentals
    label: "Are Short Term Rentals Allowed?"
    type: radio
    options:
      - "Yes"
      - "No"
      - Unknown
    jotform:
      id: TODO
  - id: projectRestriction
    label: "Project Restriction?"
    type: radio
    options:
      - "Yes"
      - "No"
      - Unknown
    jotform:
      id: TODO
      name: q_projectRestriction
  - id: seniorCommunity
    label: "Senior Community?"
    type: radio
    options:
      - "Yes"
      - "No"
      - Unknown
    jotform:
      id: TODO
      name: q_seniorCommunity
  - id: maintenanceFree
    label: "Maintenance Free?"
    type: radio
    options:
      - "Yes"
      - "No"
      - Unknown
    jotform:
      id: TODO
      name: q_maintenanceFree
  - id: solar
    label: "Does the property have solar?"
    type: radio
    required: true
    options:
      - "Yes"
      - "No"
    jotform:
      id: TODO
  - id: solarOwnership
    label: Solar ownership
    type: radio
    required: true
    status: hidden-in-jotform
    options:
      - Owned
      - Leased
      - Financed
      - Power Purchase Agreement (PPA)
    jotform:
      id: TODO
      name: q_solarOwnership
  - id: solarYearInstalled
    label: Install date / year installed
    type: text
    required: true
    status: hidden-in-jotform
    placeholder: "e.g., 2020 or 06/2020"
    jotform:
      id: TODO
      name: q_solarYearInstalled
  - id: solarSystemSizeKw
    label: System size (kW)
    type: number
    status: hidden-in-jotform
    placeholder: "if known"
    jotform:
      id: TODO
      name: q_solarSystemSizeKw
  - id: solarBatteryStorage
    label: Battery storage?
    type: radio
    status: hidden-in-jotform
    options:
      - "Yes"
      - "No"
      - Unknown
    jotform:
      id: TODO
      name: q_solarBatteryStorage
  - id: solarLoanOrLien
    label: "Loan or lien (e.g. PACE / UCC)?"
    type: radio
    status: hidden-in-jotform
    options:
      - "Yes"
      - "No"
      - Unknown
    jotform:
      id: TODO
      name: q_solarLoanOrLien
  - id: solarDocsAvailable
    label: Documents available to upload later?
    type: radio
    status: hidden-in-jotform
    options:
      - "Yes"
      - "No"
    jotform:
      id: TODO
      name: q_solarDocsAvailable
  - id: solarCompanyName
    label: Leasing Company
    type: text
    status: hidden-in-jotform
    jotform:
      id: TODO
      name: q_solarCompanyName
  - id: solarFinanceCompany
    label: Finance Company
    type: text
    status: hidden-in-jotform
    jotform:
      id: TODO
      name: q_solarFinanceCompany
  - id: solarMonthlyPayment
    label: Approx. monthly payment
    type: currency
    status: hidden-in-jotform
    placeholder: "e.g., $120"
    jotform:
      id: TODO
      name: q_solarMonthlyPayment
  - id: solarAgreementTerm
    label: Remaining term / expiration
    type: text
    status: hidden-in-jotform
    placeholder: "e.g., 12 years left or Dec 2035"
    jotform:
      id: TODO
      name: q_solarAgreementTerm
  - id: solarTransferable
    label: Agreement transferable to buyer?
    type: radio
    status: hidden-in-jotform
    options:
      - "Yes"
      - "No"
      - Unknown
    jotform:
      id: TODO
      name: q_solarTransferable
