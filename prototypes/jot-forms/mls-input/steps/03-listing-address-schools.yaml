id: listing-address-schools
title: "Listing Address & Schools"
fields:
  - id: listingAddress
    label: Listing Address
    type: address
    required: true
    description: Street address of the property being listed.
    jotform:
      id: TODO
      name: q_listingAddress
  - id: houseNumberDirection
    label: House Number Direction
    type: radio
    description: "Optional N / S / E / W for the house number (Utah grid). Leave blank if unknown — agent/VA can fill later."
    options:
      - N
      - S
      - E
      - W
    jotform:
      id: TODO
      name: q_houseNumberDirection
  - id: streetDirection
    label: Street Name Direction
    type: radio
    description: "Optional N / S / E / W for the street name or number. Leave blank if unknown — agent/VA can fill later."
    options:
      - N
      - S
      - E
      - W
    jotform:
      id: TODO
      name: q_streetDirection
  - id: listingCounty
    label: County
    type: text
    required: true
    placeholder: "e.g., Salt Lake"
    jotform:
      id: TODO
      name: q_listingCounty
  - id: listingQuadrant
    label: Quadrant
    type: radio
    # WFRMLS detail — hidden from consumer intake; VA/agent fills at MLS entry.
    status: hidden-in-jotform
    description: "NW, NE, SW, or SE area of the city (WFRMLS requirement)."
    options:
      - NW
      - NE
      - SW
      - SE
    jotform:
      id: TODO
      name: q_listingQuadrant
  - id: coordNorthSouth
    label: North / South Coordinate
    type: number
    placeholder: "e.g., 2100"
    description: "Utah grid north–south address number (optional). Agent/VA can fill if blank."
    jotform:
      id: TODO
      name: q_coordNorthSouth
  - id: coordEastWest
    label: East / West Coordinate
    type: number
    placeholder: "e.g., 1300"
    description: "Utah grid east–west address number (optional). Agent/VA can fill if blank."
    jotform:
      id: TODO
      name: q_coordEastWest
  - id: projectSubdivision
    label: Project / Subdivision
    type: text
    placeholder: "e.g., Daybreak, Forest Dale"
    description: Name of the project or subdivision, if applicable.
    jotform:
      id: TODO
      name: q_projectSubdivision
  - id: nonStandardAddress
    label: "Is this a non-standard address?"
    type: radio
    required: true
    description: "Choose Yes if the property is hard to find from the street address alone (for example rural, gated, or no formal street address). You will be asked for directions."
    options:
      - "No"
      - "Yes"
    jotform:
      id: TODO
      name: q_nonStandardAddress
  - id: directionsRemarks
    label: Directions / Non-Standard Address
    type: textarea
    required: true
    status: hidden-in-jotform
    placeholder: "Describe how to find the property if the address alone is not sufficient."
    jotform:
      id: TODO
      name: q_directionsRemarks
  - id: ownerAddressSameAsListing
    label: "Is the OWNER address the SAME as the LISTING address?"
    type: radio
    required: true
    options:
      - "Yes"
      - "No"
    jotform:
      id: TODO
  - id: ownerAddress
    label: Owner Address
    type: address
    required: true
    status: hidden-in-jotform
    jotform:
      id: TODO
  - id: listingPrice
    label: Listing Price
    type: currency
    required: true
    placeholder: "e.g., $500,000"
    jotform:
      id: TODO
  - id: listingEffectiveDate
    label: Effective Date of Listing Agreement
    type: text
    placeholder: "MM/DD/YYYY"
    description: Optional — VA/agent can fill when the listing agreement is signed.
    jotform:
      id: TODO
      name: q_listingEffectiveDate
  - id: listingExpirationDate
    label: Expiration Date
    type: text
    placeholder: "MM/DD/YYYY"
    description: Optional — VA/agent can fill when the listing agreement is signed.
    jotform:
      id: TODO
      name: q_listingExpirationDate
  - id: listingType
    label: Listing Type
    type: radio
    description: Optional — defaults to Exclusive Right to Sell (ERS) if left blank.
    options:
      - Exclusive Right to Sell (ERS)
      - Exclusive Agency (EAL)
    jotform:
      id: TODO
      name: q_listingType
  - id: specialListingConditions
    label: Special Listing Conditions
    type: checkbox
    required: false
    description: Select any that apply, or leave blank if none.
    options:
      - Short Sale
      - In Foreclosure
      - In Probate
      - Bankruptcy
      - Notice of Default
      - Trustee Sale
      - Price Was Approved by Third Party
      - Third Party Approval Required
      - Offer Under Third Party Review
      - Auction
    jotform:
      id: TODO
      name: "q_specialListingConditions[]"
  - id: possession
    label: Possession
    type: text
    placeholder: "e.g., Upon Closing, Immediate, Negotiable"
    description: When the buyer may take possession (optional).
    jotform:
      id: TODO
      name: q_possession
  - id: contactType
    label: Contact Type
    type: radio
    description: Who to contact for appointments and access (optional).
    options:
      - Agent
      - Owner
      - Assistant
    jotform:
      id: TODO
      name: q_contactType
  - id: appointmentContact
    label: Contact for Appointments & Access
    type: text
    placeholder: "Name of contact person"
    jotform:
      id: TODO
      name: q_appointmentContact
  - id: contactPhone1
    label: Contact Phone 1
    type: phone
    placeholder: (000) 000-0000
    jotform:
      id: TODO
      name: q_contactPhone1
  - id: contactPhone2
    label: Contact Phone 2
    type: phone
    placeholder: (000) 000-0000
    jotform:
      id: TODO
      name: q_contactPhone2
  - id: listingAgentName
    label: Listing Agent
    type: text
    placeholder: "Agent name"
    description: Optional — VA/agent can fill.
    jotform:
      id: TODO
      name: q_listingAgentName
  - id: listingCoAgentName
    label: Co-Agent
    type: text
    placeholder: "Co-agent name, if any"
    description: Optional — VA/agent can fill.
    jotform:
      id: TODO
      name: q_listingCoAgentName
  - id: listingOfficeName
    label: Office Name
    type: text
    placeholder: "Listing office / brokerage"
    description: Optional — VA/agent can fill.
    jotform:
      id: TODO
      name: q_listingOfficeName
  - id: schools
    label: Schools
    type: matrix
    required: true
    rows:
      - School District
      - Elementary School
      - Junior High/Middle School
      - High School
    columns:
      - id: name
        label: NAME
        type: text
    jotform:
      id: TODO
  - id: otherSchool
    label: Other School
    type: text
    placeholder: "If applicable"
    description: Optional — any other school not listed above.
    jotform:
      id: TODO
      name: q_otherSchool
