gaps:
  - >-
    Some listing-ops fields (dates, listing type, agent/office) are now optional MLS intake
    inputs so the Data Form can auto-fill; staff may still enter or correct them in Matrix.
  - Early steps and newly added WFRMLS fields lack JotForm IDs in the source dump; marked TODO for migration mapping.
wfrmlsCoverage:
  addedInSpecUpdate:
    - Structured listing address, county, quadrant
    - Short sale status
    - Construction status, tax parcel number, P.U.D. property type
    - Basement finished, style now required
    - Secondary owner contact (conditional)
    - HOA fee/month and contact (conditional)
    - Accessibility, interior/exterior special features (surfaced)
    - Amenities, window coverings, lot facts, animals/pets
    - Water, telecommunications, environmental certifications
    - HOA remarks, exclusions remarks, directions for non-standard address
