id: mls-input
title: MLS Input Form
jotformId: "261498349657980"
jotformUrl: "https://form.jotform.com/261498349657980"
estimatedMinutes: 20-25
saveAndResume: true
instructions:
  - Please plan on 20-25 minutes to fill out this information.
  - We will need all the information completed before we can list your property
  - You can save and return to this form at any time by clicking save at the bottom and following the instructions.
